<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedigree Chart Drawer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NEW: The Unified Top Toolbar -->
    <div id="toolbar">
        <div class="tool-group" id="color-tools">
            <label>Background: <input type="color" id="bg-color" value="#ffffff"></label>
            <label>Text: <input type="color" id="text-color" value="#000000"></label>
        </div>
        <!-- Phase 4 Tabs and Phase 5 Save buttons will go here later -->
    </div>

    <div id="canvas">
        <svg id="connections"></svg>
        
        <div class="branch" id="root">
            <div class="node-container">
                <!-- Added data-bg and data-text to track colors for inheritance -->
                <div class="node active" contenteditable="true" data-id="node-1" data-placeholder="Starting Node" data-bg="#ffffff" data-text="#000000"></div>
                <div class="controls">
                    <button class="btn-add btn-sibling" title="Add Sibling">⬆️</button>
                    <button class="btn-add btn-child" title="Add Child">➡️</button>
                </div>
            </div>
            <div class="children"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
