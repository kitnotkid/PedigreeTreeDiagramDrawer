<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedigree Chart Drawer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="canvas">
        <svg id="connections"></svg>
        
        <div class="branch" id="root">
            <div class="node-container">
                <div class="node" contenteditable="true" data-id="node-1" data-placeholder="Starting Node"></div>
                <div class="controls">
                    <button class="btn-add btn-sibling" title="Add Sibling">⬆️</button>
                    <button class="btn-add btn-child" title="Add Child">➡️</button>
                </div>
            </div>
            <div class="children"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
