<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedigree Chart Drawer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NEW: The Unified Top Toolbar -->
    <!-- The Unified Top Toolbar -->
    <div id="toolbar">
        
        <!-- Background Color Presets -->
        <div class="tool-group">
            <label>Bg:</label>
            <div class="color-swatches" id="bg-swatches">
                <button class="swatch" style="background-color: #ffffff;" data-color="#ffffff"></button>
                <button class="swatch" style="background-color: #ffebee;" data-color="#ffebee"></button> <!-- Light Red -->
                <button class="swatch" style="background-color: #e3f2fd;" data-color="#e3f2fd"></button> <!-- Light Blue -->
                <button class="swatch" style="background-color: #e8f5e9;" data-color="#e8f5e9"></button> <!-- Light Green -->
                <button class="swatch" style="background-color: #fff8e1;" data-color="#fff8e1"></button> <!-- Light Yellow -->
                <div class="custom-picker-wrapper" title="Custom Background Color">
                    <input type="color" id="bg-color-custom" value="#ffffff">
                    <span>🎨</span>
                </div>
            </div>
        </div>

        <div class="toolbar-divider"></div>

        <!-- Text Color Presets -->
        <div class="tool-group">
            <label>Text:</label>
            <div class="color-swatches" id="text-swatches">
                <button class="swatch" style="background-color: #000000;" data-color="#000000"></button>
                <button class="swatch" style="background-color: #d32f2f;" data-color="#d32f2f"></button> <!-- Red -->
                <button class="swatch" style="background-color: #1976d2;" data-color="#1976d2"></button> <!-- Blue -->
                <div class="custom-picker-wrapper" title="Custom Text Color">
                    <input type="color" id="text-color-custom" value="#000000">
                    <span>🎨</span>
                </div>
            </div>
        </div>

    </div>

    <div id="canvas">
        <svg id="connections"></svg>
        
        <div class="branch" id="root">
            <div class="node-container">
                <!-- Added data-bg and data-text to track colors for inheritance -->
                <div class="node active" contenteditable="true" data-id="node-1" data-placeholder="Starting Node" data-bg="#ffffff" data-text="#000000"></div>
                <div class="controls">
                    <button class="btn-add btn-sibling" title="Add Sibling">⬆️</button>
                    <button class="btn-add btn-child" title="Add Child">➡️</button>
                </div>
            </div>
            <div class="children"></div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
